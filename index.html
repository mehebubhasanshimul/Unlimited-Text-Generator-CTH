<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Text Multiplier | SHADOW JOKER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff00c1;
            --bg-dark: #050b18;
            --glass: rgba(17, 25, 40, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Animated Background Particles */
        .bg-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #102a43 0%, #050b18 100%);
        }

        /* Glassmorphism Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 25px; }

        /* Hacker GIF/Logo */
        .hacker-gif {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--primary);
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-box { margin-bottom: 15px; position: relative; }
        .input-box label { display: block; font-size: 12px; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }

        .btn-glow {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        .btn-glow:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--primary);
            letter-spacing: 1px;
        }

        #resultArea {
            margin-top: 15px;
            display: none;
            height: 100px;
            resize: none;
            font-family: monospace;
            background: #000;
            border: 1px solid var(--accent);
        }

        .action-btns { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-copy { background: #00ff88; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #ff4b2b; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Telegram Join Button Section */
        .tg-join-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #24A1DE;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 50px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 14px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(36, 161, 222, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(36, 161, 222, 0); }
            100% { box-shadow: 0 0 0 0 rgba(36, 161, 222, 0); }
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .footer h4 { color: var(--primary); letter-spacing: 2px; }
        .footer p { font-size: 10px; opacity: 0.6; margin-bottom: 10px; }

        .social-icons { display: flex; justify-content: center; gap: 15px; }
        .social-icons a {
            color: #fff;
            font-size: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.3s;
        }

        .social-icons a:hover { background: var(--primary); color: #000; transform: translateY(-5px); }

    </style>
</head>
<body>

<div class="bg-animate"></div>

<div class="container">
    <div class="header">
        <img src="https://cdn.pixabay.com/animation/2023/03/24/09/20/09-20-04-188_512.gif" alt="Hacker" class="hacker-gif">
        <h1>Text Multiplier</h1>
        <p style="font-size: 11px; color: var(--secondary);">V3.0 Professional Edition</p>
    </div>

    <div class="input-box">
        <label><i class="fas fa-keyboard"></i> Your Text:</label>
        <input type="text" id="mainText" placeholder="কি লিখতে চান?">
    </div>

    <div class="input-box">
        <label><i class="fas fa-sort-amount-up"></i> Limit (1 - 10000):</label>
        <input type="number" id="limit" placeholder="কতবার রিপিট করবেন?">
    </div>

    <button class="btn-glow" onclick="generate()">Generate Magic ✨</button>

    <textarea id="resultArea" readonly></textarea>

    <div class="action-btns" id="actionGroup">
        <button class="btn-copy" onclick="copy()"><i class="fas fa-copy"></i> Copy</button>
        <button class="btn-reset" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Reset</button>
    </div>

    <a href="https://t.me/shadow_joker_cyberteamhelp" target="_blank" class="tg-join-btn">
        <i class="fab fa-telegram-plane" style="margin-right: 10px;"></i> JOIN TELEGRAM CHANNEL
    </a>

    <div class="footer">
        <h4>SHADOW JOKER</h4>
        <p>Lead Developer | Cyber Team Help</p>
        <div class="social-icons">
            <a href="https://wa.me/8801950178309"><i class="fab fa-whatsapp"></i></a>
            <a href="https://t.me/SHADOW_JOKER_CTH"><i class="fab fa-telegram-plane"></i></a>
        </div>
    </div>
</div>

<script>
    function generate() {
        const text = document.getElementById('mainText').value;
        const limit = document.getElementById('limit').value;
        const result = document.getElementById('resultArea');
        const actionGroup = document.getElementById('actionGroup');

        if (!text || !limit) {
            alert("অনুগ্রহ করে টেক্সট এবং লিমিট দিন!");
            return;
        }

        if (limit > 10000) {
            alert("লিমিট ১০০০০ এর বেশি হতে পারবে না!");
            return;
        }

        let output = "";
        for (let i = 0; i < limit; i++) {
            output += text + "\n";
        }

        result.value = output;
        result.style.display = "block";
        actionGroup.style.display = "grid";
        
        // Success animation effect
        document.querySelector('.container').style.boxShadow = "0 0 40px rgba(0, 242, 254, 0.6)";
    }

    function copy() {
        const result = document.getElementById('resultArea');
        result.select();
        document.execCommand('copy');
        
        const copyBtn = document.querySelector('.btn-copy');
        copyBtn.innerHTML = "<i class='fas fa-check'></i> Copied!";
        setTimeout(() => {
            copyBtn.innerHTML = "<i class='fas fa-copy'></i> Copy";
        }, 2000);
    }
</script>

</body>
</html>
