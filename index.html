<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Color Text Multiplier | SHADOW JOKER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.15);
            --primary: #00ffcc;
            --accent: #ff00c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 🔥 Live Animated Background */
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow-x: hidden;
            color: #fff;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Multi-color Animated Text */
        .header h1 {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(to right, #ff0000, #fffb00, #00ffd5, #002bff, #ff00c8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowText 3s linear infinite;
            text-transform: uppercase;
        }

        @keyframes rainbowText {
            to { background-position: 200% center; }
        }

        .hacker-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
        }

        .input-group { margin-top: 15px; text-align: left; }
        .input-group label { color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        /* Buttons Container */
        .btn-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-gen { background: linear-gradient(90deg, #00ffcc, #00ccff); color: #000; width: 100%; font-size: 16px; }
        .btn-copy { background: #ff00c8; color: #fff; }
        .btn-reset { background: #444; color: #fff; }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0.9; }

        #resultArea {
            height: 120px;
            margin-top: 15px;
            background: #000;
            color: #00ff00;
            border: 1px solid #444;
            display: none;
            font-family: monospace;
        }

        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            padding: 12px;
            background: #24A1DE;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(36,161,222,0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; }
        .footer h3 { color: var(--primary); font-size: 18px; margin-bottom: 5px; }
        
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamZ3Y2x2amR3ZGd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/YQitE4YNQNahy/giphy.gif" class="hacker-logo">
        <h1>Text Multiplier</h1>
        <p style="color: #ccc; font-size: 11px;">PRO VERSION BY CYBER TEAM HELP</p>
    </div>

    <div class="input-group">
        <label>Message:</label>
        <input type="text" id="mainText" placeholder="আপনার মেসেজ লিখুন...">
    </div>

    <div class="input-group">
        <label>Limit (1-10000):</label>
        <input type="number" id="limit" placeholder="কতবার চান?">
    </div>

    <div class="btn-container">
        <button class="btn-gen" onclick="generate()">
            <i class="fas fa-bolt"></i> GENERATE MAGIC
        </button>
        
        <div class="action-btns">
            <button class="btn-copy" onclick="copyText()">
                <i class="fas fa-copy"></i> COPY
            </button>
            <button class="btn-reset" onclick="resetForm()">
                <i class="fas fa-trash-alt"></i> RESET
            </button>
        </div>
    </div>

    <textarea id="resultArea" readonly></textarea>

    <a href="https://t.me/shadow_joker_cyberteamhelp" target="_blank" class="tg-btn">
        <i class="fab fa-telegram-plane"></i> &nbsp; JOIN TELEGRAM CHANNEL
    </a>

    <div class="footer">
        <h3>SHADOW JOKER</h3>
        <p style="font-size: 10px; color: #888;">&copy; 2024 All Rights Reserved</p>
    </div>
</div>

<script>
    function generate() {
        const text = document.getElementById('mainText').value;
        const limit = document.getElementById('limit').value;
        const resultArea = document.getElementById('resultArea');

        if (!text || !limit) {
            alert("আগে মেসেজ আর লিমিট লেখেন ভাই!");
            return;
        }

        let output = "";
        for (let i = 0; i < limit; i++) {
            output += text + "\n";
        }

        resultArea.value = output;
        resultArea.style.display = "block";
    }

    function copyText() {
        const resultArea = document.getElementById('resultArea');
        if (!resultArea.value) {
            alert("কপি করার মতো কিছুই নাই!");
            return;
        }
        resultArea.select();
        document.execCommand('copy');
        alert("কপি করা হয়েছে! ✅");
    }

    function resetForm() {
        document.getElementById('mainText').value = "";
        document.getElementById('limit').value = "";
        const resultArea = document.getElementById('resultArea');
        resultArea.value = "";
        resultArea.style.display = "none";
    }
</script>

</body>
</html>
