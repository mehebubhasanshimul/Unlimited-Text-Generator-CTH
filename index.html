<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Color Text Multiplier | SHADOW JOKER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 🔥 Live Animated Background */
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        /* 🟢 Multi-color Animated Text Effect */
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to right, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowText 3s linear infinite;
            text-transform: uppercase;
        }

        @keyframes rainbowText {
            to { background-position: 200% center; }
        }

        /* Working GIF Icon */
        .hacker-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            object-fit: cover;
        }

        .input-group { margin-top: 20px; text-align: left; }
        .input-group label { color: #00ffcc; font-size: 13px; font-weight: bold; }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.3); }

        .btn-generate {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: #000;
        }

        .btn-generate:hover { transform: scale(1.05); box-shadow: 0 0 30px #00ffcc; }

        #resultArea {
            width: 100%;
            height: 100px;
            margin-top: 15px;
            background: #000;
            color: #00ff00;
            border: 1px solid #333;
            border-radius: 10px;
            display: none;
            padding: 10px;
        }

        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 25px;
            padding: 12px;
            background: #24A1DE;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(36, 161, 222, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(36, 161, 222, 0); }
            100% { box-shadow: 0 0 0 0 rgba(36, 161, 222, 0); }
        }

        .footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; }
        .footer h3 { color: #fff; font-size: 18px; margin-bottom: 5px; }
        .footer p { font-size: 12px; color: #aaa; }
        
        .socials { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .socials a { color: #fff; font-size: 22px; transition: 0.3s; }
        .socials a:hover { color: #00ffcc; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamZ3Y2x2amR3ZGd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/YQitE4YNQNahy/giphy.gif" class="hacker-logo" alt="Logo">
        <h1>Text Multiplier</h1>
        <p style="color: #00ffcc; font-size: 12px;">Unlimited Text Generator Pro</p>
    </div>

    <div class="input-group">
        <label><i class="fas fa-edit"></i> আপনার মেসেজটি লিখুন:</label>
        <input type="text" id="mainText" placeholder="যেমন: আই লাভ ইউ">
    </div>

    <div class="input-group">
        <label><i class="fas fa-list-ol"></i> কতবার হবে? (১ - ১০০০০):</label>
        <input type="number" id="limit" placeholder="যেমন: ৫০০">
    </div>

    <button class="btn-generate" onclick="generate()">জাদু দেখুন ✨</button>

    <textarea id="resultArea" readonly></textarea>

    <a href="https://t.me/shadow_joker_cyberteamhelp" target="_blank" class="tg-btn">
        <i class="fab fa-telegram-plane"></i> &nbsp; জয়েন করুন টেলিগ্রাম চ্যানেলে
    </a>

    <div class="footer">
        <h3>SHADOW JOKER</h3>
        <p>Lead Developer | Cyber Team Help</p>
        <div class="socials">
            <a href="https://wa.me/8801950178309"><i class="fab fa-whatsapp"></i></a>
            <a href="https://t.me/SHADOW_JOKER_CTH"><i class="fab fa-telegram"></i></a>
        </div>
    </div>
</div>

<script>
    function generate() {
        const text = document.getElementById('mainText').value;
        const limit = document.getElementById('limit').value;
        const resultArea = document.getElementById('resultArea');

        if (!text || !limit) {
            alert("সবগুলো বক্স ঠিকঠাক পূরণ করুন!");
            return;
        }

        let output = "";
        for (let i = 0; i < limit; i++) {
            output += text + "\n";
        }

        resultArea.value = output;
        resultArea.style.display = "block";
        resultArea.select();
    }
</script>

</body>
</html>
