<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Text Multiplier | SHADOW JOKER</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#00ffcc;
    --accent:#ff00c8;
}

/* 🌌 Background */
body{
    font-family:Poppins;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
    background-size:400% 400%;
    animation:bg 10s infinite;
    color:#fff;
    padding:15px;
}
@keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* 🧊 Glass Card */
.container{
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(20px);
    padding:25px;
    border-radius:20px;
    width:100%;
    max-width:450px;
    box-shadow:0 0 40px #000;
    text-align:center;
}

/* 🌈 Title */
h1{
    font-size:24px;
    font-weight:900;
    background:linear-gradient(to right,#ff0000,#fffb00,#00ffd5,#002bff,#ff00c8);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rainbow 3s linear infinite;
}
@keyframes rainbow{
    to{background-position:200%}
}

/* Inputs */
input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#111;
    color:#fff;
    outline:none;
}

/* Buttons */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.btn-gen{background:linear-gradient(90deg,#00ffcc,#00ccff);color:#000;}
.btn-copy{background:#ff00c8;color:#fff;}
.btn-reset{background:#333;color:#fff;}
.btn-download{background:#00ff88;color:#000;}
.btn-wa{background:#25D366;color:#000;}
.btn-msg{background:#0084FF;color:#fff;}

button:hover{transform:scale(1.03);}

/* Result */
#result{
    height:130px;
    display:none;
    margin-top:10px;
    background:#000;
    color:#00ff00;
    font-family:monospace;
}

/* Loader */
.loader{
    display:none;
    margin-top:10px;
    font-size:14px;
}

/* Toast */
.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#00ff88;
    color:#000;
    padding:10px 20px;
    border-radius:20px;
    display:none;
}

/* Telegram */
.tg{
    margin-top:15px;
    display:block;
    padding:10px;
    background:#24A1DE;
    color:#fff;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>TEXT MULTIPLIER</h1>

<input type="text" id="text" placeholder="কি লিখতে চান?">
<input type="number" id="limit" placeholder="কতবার রিপিট করবেন?">

<button class="btn-gen" onclick="generate()">⚡ Generate</button>

<div class="loader" id="loader">Processing...</div>

<textarea id="result" readonly></textarea>

<button class="btn-copy" onclick="copy()">📋 Copy</button>
<button class="btn-download" onclick="download()">⬇ Download</button>
<button class="btn-wa" onclick="shareWhatsApp()">📲 WhatsApp</button>
<button class="btn-msg" onclick="shareMessenger()">💬 Messenger</button>
<button class="btn-reset" onclick="reset()">♻ Reset</button>

<a href="https://t.me/shadow_joker_cyberteamhelp" class="tg">JOIN TELEGRAM</a>

</div>

<div class="toast" id="toast">Copied ✅</div>

<script>
function generate(){
    let text=document.getElementById('text').value;
    let limit=document.getElementById('limit').value;
    let result=document.getElementById('result');
    let loader=document.getElementById('loader');

    if(!text||!limit){
        alert("আগে ইনপুট দেন!");
        return;
    }

    if(limit>10000){
        alert("Max 10000!");
        return;
    }

    loader.style.display="block";
    result.style.display="block";
    result.value="";

    let output="";
    for(let i=0;i<limit;i++){
        output+=text+"\n";
    }

    loader.style.display="none";

    // 🔥 TYPEWRITER EFFECT
    let i=0;
    function typeEffect(){
        if(i < output.length){
            result.value += output.charAt(i);
            result.scrollTop = result.scrollHeight;
            i++;
            setTimeout(typeEffect, 5);
        }
    }
    typeEffect();
}

// COPY
function copy(){
    let result=document.getElementById('result');
    result.select();
    document.execCommand("copy");

    let toast=document.getElementById('toast');
    toast.style.display="block";
    setTimeout(()=>toast.style.display="none",2000);
}

// DOWNLOAD
function download(){
    let text=document.getElementById('result').value;
    let blob=new Blob([text],{type:"text/plain"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="text.txt";
    a.click();
}

// WHATSAPP
function shareWhatsApp(){
    let text=document.getElementById('result').value;
    if(!text){ alert("আগে generate করুন!"); return; }
    window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// MESSENGER
function shareMessenger(){
    let text=document.getElementById('result').value;
    if(!text){ alert("আগে generate করুন!"); return; }
    window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(text));
}

// RESET
function reset(){
    location.reload();
}
</script>

</body>
</html>
